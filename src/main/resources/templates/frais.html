<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><title>Frais</title></head>
<body>
    <div th:fragment="content">
        <h1 class="h2 pt-3 pb-2 mb-3 border-bottom">Gestion des Frais</h1>
        <div class="card"><div class="card-body">
            <table class="table table-hover">
                <thead><tr><th>Type</th><th>Montant</th><th>Devise</th><th>Stage</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="f : ${frais}">
                        <td th:text="${f.typeFrais}"></td>
                        <td th:text="${f.montant}"></td>
                        <td th:text="${f.devise}"></td>
                        <td th:text="${f.stage != null ? f.stage.intitule : 'N/A'}"></td>
                        <td><a th:href="@{/web/frais/delete/{id}(id=${f.id})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a></td>
                    </tr>
                </tbody>
            </table>
        </div></div>
    </div>
</body>
</html>
