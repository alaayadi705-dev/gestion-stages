<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header-css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Gestion des Stages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <h5 class="px-3 mb-3 text-primary">Gestion Stages</h5>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}" th:href="@{/web/dashboard}">
                                <i class="bi bi-speedometer2 me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activePage == 'stagiaires' ? 'active' : ''}" th:href="@{/web/stagiaires}">
                                <i class="bi bi-people me-2"></i> Stagiaires
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activePage == 'stages' ? 'active' : ''}" th:href="@{/web/stages}">
                                <i class="bi bi-briefcase me-2"></i> Stages
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activePage == 'entreprises' ? 'active' : ''}" th:href="@{/web/entreprises}">
                                <i class="bi bi-building me-2"></i> Entreprises
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activePage == 'frais' ? 'active' : ''}" th:href="@{/web/frais}">
                                <i class="bi bi-cash-coin me-2"></i> Frais
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activePage == 'rapports' ? 'active' : ''}" th:href="@{/web/rapports}">
                                <i class="bi bi-file-earmark-text me-2"></i> Rapports
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:classappend="${activePage == 'utilisateurs' ? 'active' : ''}" th:href="@{/web/utilisateurs}">
                                <i class="bi bi-person-badge me-2"></i> Utilisateurs
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div th:replace="${content}"></div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
