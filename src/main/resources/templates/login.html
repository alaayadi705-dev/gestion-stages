<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Gestion Stages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 1rem; }
    </style>
</head>
<body>
    <div class="card shadow-lg login-card">
        <div class="text-center mb-4">
            <h2 class="text-primary fw-bold">Gestion Stages</h2>
            <p class="text-muted">Connectez-vous pour continuer</p>
        </div>
        <form th:action="@{/web/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="nom@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Se connecter</button>
        </form>
    </div>
</body>
</html>
