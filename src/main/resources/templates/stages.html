<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><title>Stages</title></head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Gestion des Stages</h1>
            <a href="#" class="btn btn-primary">Nouveau Stage</a>
        </div>
        <div class="card"><div class="card-body">
            <table class="table table-hover">
                <thead><tr><th>Intitulé</th><th>Entreprise</th><th>Début</th><th>Fin</th><th>Statut</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="stg : ${stages}">
                        <td th:text="${stg.intitule}"></td>
                        <td th:text="${stg.entreprise != null ? stg.entreprise.nom : 'N/A'}"></td>
                        <td th:text="${stg.dateDebut}"></td>
                        <td th:text="${stg.dateFin}"></td>
                        <td><span class="badge" th:classappend="${stg.statut == 'CLOTURE' ? 'bg-secondary' : 'bg-success'}" th:text="${stg.statut}"></span></td>
                        <td><a th:href="@{/web/stages/delete/{id}(id=${stg.id})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a></td>
                    </tr>
                </tbody>
            </table>
        </div></div>
    </div>
</body>
</html>
