<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head>
    <title>Dashboard - Gestion Stages</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">Tableau de Bord</h1>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card bg-primary text-white p-3">
                    <h3>Stagiaires</h3>
                    <p class="display-6" th:text="${totalStagiaires}">0</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white p-3">
                    <h3>Entreprises</h3>
                    <p class="display-6" th:text="${totalEntreprises}">0</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-dark p-3">
                    <h3>Stages</h3>
                    <p class="display-6" th:text="${totalStages}">0</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
