<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><title>Utilisateurs</title></head>
<body>
    <div th:fragment="content">
        <h1 class="h2 pt-3 pb-2 mb-3 border-bottom">Gestion des Utilisateurs</h1>
        <div class="card"><div class="card-body">
            <table class="table table-hover">
                <thead><tr><th>Nom</th><th>Prénom</th><th>Email</th><th>Rôle</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="u : ${utilisateurs}">
                        <td th:text="${u.nom}"></td>
                        <td th:text="${u.prenom}"></td>
                        <td th:text="${u.email}"></td>
                        <td><span class="badge bg-secondary" th:text="${u.role}"></span></td>
                        <td><a th:href="@{/web/utilisateurs/delete/{id}(id=${u.id})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a></td>
                    </tr>
                </tbody>
            </table>
        </div></div>
    </div>
</body>
</html>
